name: Discord Notifications
on:
  push:
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft, review_requested]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, closed, reopened, assigned, labeled]
  issue_comment:
    types: [created]
  create:
  delete:
  release:
    types: [published, prereleased]
  fork:
  watch:
    types: [started]
  discussion:
    types: [created, answered]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:

      # ─── PUSH ───────────────────────────────────────────────
      - name: Push Notification
        if: github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Merge')
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "📦 New Commit on `${{ github.ref_name }}`",
                "description": "```${{ github.event.head_commit.message }}```",
                "url": "${{ github.event.head_commit.url }}",
                "color": 5814783,
                "fields": [
                  { "name": "👤 Author", "value": "${{ github.event.head_commit.author.name }}", "inline": true },
                  { "name": "🌿 Branch", "value": "`${{ github.ref_name }}`", "inline": true },
                  { "name": "🔑 SHA", "value": "`${{ github.event.after }}`", "inline": false },
                  { "name": "📁 Repo", "value": "${{ github.repository }}", "inline": true },
                  { "name": "📊 Files Changed", "value": "${{ toJson(github.event.commits) }}", "inline": false }
                ],
                "timestamp": "${{ github.event.head_commit.timestamp }}",
                "footer": { "text": "GitHub Push • ${{ github.repository }}" }
              }]
            }'

      # ─── MERGE (push where message starts with Merge) ───────
      - name: Merge Notification
        if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Merge')
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔀 Branch Merged into `${{ github.ref_name }}`",
                "description": "```${{ github.event.head_commit.message }}```",
                "color": 9699539,
                "fields": [
                  { "name": "👤 Merged By", "value": "${{ github.actor }}", "inline": true },
                  { "name": "🎯 Target Branch", "value": "`${{ github.ref_name }}`", "inline": true },
                  { "name": "🔑 SHA", "value": "`${{ github.event.after }}`", "inline": false }
                ],
                "timestamp": "${{ github.event.head_commit.timestamp }}",
                "footer": { "text": "GitHub Merge • ${{ github.repository }}" }
              }]
            }'

      # ─── PULL REQUEST OPENED ────────────────────────────────
      - name: PR Opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🔃 Pull Request Opened: ${{ github.event.pull_request.title }}",
                "description": "${{ github.event.pull_request.body || 'No description provided.' }}",
                "url": "${{ github.event.pull_request.html_url }}",
                "color": 3066993,
                "fields": [
                  { "name": "👤 Author", "value": "${{ github.event.pull_request.user.login }}", "inline": true },
                  { "name": "🌿 From Branch", "value": "`${{ github.event.pull_request.head.ref }}`", "inline": true },
                  { "name": "🎯 Into Branch", "value": "`${{ github.event.pull_request.base.ref }}`", "inline": true },
                  { "name": "📊 Changes", "value": "+${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }}", "inline": true },
                  { "name": "📁 Files Changed", "value": "${{ github.event.pull_request.changed_files }}", "inline": true },
                  { "name": "💬 Comments", "value": "${{ github.event.pull_request.comments }}", "inline": true }
                ],
                "timestamp": "${{ github.event.pull_request.created_at }}",
                "footer": { "text": "PR #${{ github.event.pull_request.number }} • ${{ github.repository }}" }
              }]
            }'

      # ─── PULL REQUEST CLOSED / MERGED ───────────────────────
      - name: PR Closed or Merged
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          MERGED=${{ github.event.pull_request.merged }}
          if [ "$MERGED" = "true" ]; then
            TITLE="✅ Pull Request Merged: ${{ github.event.pull_request.title }}"
            COLOR=5763719
            STATUS="Merged"
          else
            TITLE="❌ Pull Request Closed: ${{ github.event.pull_request.title }}"
            COLOR=15548997
            STATUS="Closed without merge"
          fi
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true },
                  { \"name\": \"🔀 Status\", \"value\": \"$STATUS\", \"inline\": true },
                  { \"name\": \"🌿 From\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\`\", \"inline\": true },
                  { \"name\": \"🎯 Into\", \"value\": \"\`${{ github.event.pull_request.base.ref }}\`\", \"inline\": true },
                  { \"name\": \"📊 Changes\", \"value\": \"+${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }}\", \"inline\": true },
                  { \"name\": \"📁 Files\", \"value\": \"${{ github.event.pull_request.changed_files }}\", \"inline\": true }
                ],
                \"timestamp\": \"${{ github.event.pull_request.closed_at }}\",
                \"footer\": { \"text\": \"PR #${{ github.event.pull_request.number }} • ${{ github.repository }}\" }
              }]
            }"

      # ─── PULL REQUEST REVIEW ────────────────────────────────
      - name: PR Review Submitted
        if: github.event_name == 'pull_request_review'
        run: |
          STATE="${{ github.event.review.state }}"
          if [ "$STATE" = "approved" ]; then
            TITLE="✅ PR Approved"
            COLOR=5763719
          elif [ "$STATE" = "changes_requested" ]; then
            TITLE="🔁 Changes Requested on PR"
            COLOR=15548997
          else
            TITLE="💬 PR Review Comment"
            COLOR=3447003
          fi
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE: ${{ github.event.pull_request.title }}\",
                \"description\": \"${{ github.event.review.body || 'No comment left.' }}\",
                \"url\": \"${{ github.event.review.html_url }}\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"👤 Reviewer\", \"value\": \"${{ github.event.review.user.login }}\", \"inline\": true },
                  { \"name\": \"📋 PR\", \"value\": \"#${{ github.event.pull_request.number }}\", \"inline\": true }
                ],
                \"timestamp\": \"${{ github.event.review.submitted_at }}\",
                \"footer\": { \"text\": \"PR Review • ${{ github.repository }}\" }
              }]
            }"

      # ─── BRANCH CREATED ─────────────────────────────────────
      - name: Branch Created
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🌿 New Branch Created",
                "color": 3447003,
                "fields": [
                  { "name": "🌿 Branch", "value": "`${{ github.event.ref }}`", "inline": true },
                  { "name": "👤 Created By", "value": "${{ github.actor }}", "inline": true },
                  { "name": "📁 Repo", "value": "${{ github.repository }}", "inline": true }
                ],
                "footer": { "text": "Branch Created • ${{ github.repository }}" }
              }]
            }'

      # ─── BRANCH DELETED ─────────────────────────────────────
      - name: Branch Deleted
        if: github.event_name == 'delete' && github.event.ref_type == 'branch'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🗑️ Branch Deleted",
                "color": 15548997,
                "fields": [
                  { "name": "🌿 Branch", "value": "`${{ github.event.ref }}`", "inline": true },
                  { "name": "👤 Deleted By", "value": "${{ github.actor }}", "inline": true }
                ],
                "footer": { "text": "Branch Deleted • ${{ github.repository }}" }
              }]
            }'

      # ─── TAG CREATED ─────────────────────────────────────────
      - name: Tag Created
        if: github.event_name == 'create' && github.event.ref_type == 'tag'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🏷️ New Tag Created: `${{ github.event.ref }}`",
                "color": 15844367,
                "fields": [
                  { "name": "🏷️ Tag", "value": "`${{ github.event.ref }}`", "inline": true },
                  { "name": "👤 Created By", "value": "${{ github.actor }}", "inline": true }
                ],
                "footer": { "text": "Tag Created • ${{ github.repository }}" }
              }]
            }'

      # ─── RELEASE PUBLISHED ──────────────────────────────────
      - name: Release Published
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 New Release: ${{ github.event.release.name }}",
                "description": "${{ github.event.release.body || 'No release notes.' }}",
                "url": "${{ github.event.release.html_url }}",
                "color": 15844367,
                "fields": [
                  { "name": "🏷️ Tag", "value": "`${{ github.event.release.tag_name }}`", "inline": true },
                  { "name": "👤 Author", "value": "${{ github.event.release.author.login }}", "inline": true },
                  { "name": "📦 Prerelease", "value": "${{ github.event.release.prerelease }}", "inline": true }
                ],
                "timestamp": "${{ github.event.release.published_at }}",
                "footer": { "text": "Release • ${{ github.repository }}" }
              }]
            }'

      # ─── ISSUE OPENED ───────────────────────────────────────
      - name: Issue Opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🐛 New Issue: ${{ github.event.issue.title }}",
                "description": "${{ github.event.issue.body || 'No description.' }}",
                "url": "${{ github.event.issue.html_url }}",
                "color": 15548997,
                "fields": [
                  { "name": "👤 Opened By", "value": "${{ github.event.issue.user.login }}", "inline": true },
                  { "name": "🏷️ Labels", "value": "${{ join(github.event.issue.labels.*.name, ', ') || 'None' }}", "inline": true },
                  { "name": "👥 Assignees", "value": "${{ join(github.event.issue.assignees.*.login, ', ') || 'None' }}", "inline": true }
                ],
                "timestamp": "${{ github.event.issue.created_at }}",
                "footer": { "text": "Issue #${{ github.event.issue.number }} • ${{ github.repository }}" }
              }]
            }'

      # ─── ISSUE CLOSED ───────────────────────────────────────
      - name: Issue Closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Issue Closed: ${{ github.event.issue.title }}",
                "url": "${{ github.event.issue.html_url }}",
                "color": 5763719,
                "fields": [
                  { "name": "👤 Closed By", "value": "${{ github.actor }}", "inline": true },
                  { "name": "🏷️ Labels", "value": "${{ join(github.event.issue.labels.*.name, ', ') || 'None' }}", "inline": true }
                ],
                "timestamp": "${{ github.event.issue.closed_at }}",
                "footer": { "text": "Issue #${{ github.event.issue.number }} • ${{ github.repository }}" }
              }]
            }'

      # ─── ISSUE COMMENT ──────────────────────────────────────
      - name: Issue Comment
        if: github.event_name == 'issue_comment' && github.event.action == 'created'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "💬 New Comment on Issue: ${{ github.event.issue.title }}",
                "description": "${{ github.event.comment.body }}",
                "url": "${{ github.event.comment.html_url }}",
                "color": 3447003,
                "fields": [
                  { "name": "👤 Commenter", "value": "${{ github.event.comment.user.login }}", "inline": true },
                  { "name": "📋 Issue", "value": "#${{ github.event.issue.number }}", "inline": true }
                ],
                "timestamp": "${{ github.event.comment.created_at }}",
                "footer": { "text": "Issue Comment • ${{ github.repository }}" }
              }]
            }'

      # ─── REPO FORKED ────────────────────────────────────────
      - name: Repo Forked
        if: github.event_name == 'fork'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🍴 Repo Forked!",
                "color": 15844367,
                "fields": [
                  { "name": "👤 Forked By", "value": "${{ github.event.forkee.owner.login }}", "inline": true },
                  { "name": "🔗 Fork URL", "value": "${{ github.event.forkee.html_url }}", "inline": false }
                ],
                "footer": { "text": "Fork • ${{ github.repository }}" }
              }]
            }'

      # ─── REPO STARRED ───────────────────────────────────────
      - name: Repo Starred
        if: github.event_name == 'watch' && github.event.action == 'started'
        run: |
          curl -X POST "https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⭐ Someone Starred the Repo!",
                "color": 15844367,
                "fields": [
                  { "name": "👤 Starred By", "value": "${{ github.actor }}", "inline": true },
                  { "name": "⭐ Total Stars", "value": "${{ github.event.repository.stargazers_count }}", "inline": true }
                ],
                "footer": { "text": "Star • ${{ github.repository }}" }
              }]
            }'
